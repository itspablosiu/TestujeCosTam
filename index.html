<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruffle Flash Player</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: sans-serif;
        }
        /* Kontener na grę */
        #flash-container {
            width: 800px;
            height: 600px;
            border: 2px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="flash-container"></div>

    <!-- Ścieżka do Twojego pliku ruffle.js -->
    <script src="ruffle.js"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("flash-container");
            
            container.appendChild(player);

            // Załadowanie pliku .swf
            player.load("double.swf").then(() => {
                console.info("Flash załadowany pomyślnie!");
            }).catch((e) => {
                console.error("Błąd ładowania pliku SWF: ", e);
            });

            // Opcjonalna konfiguracja (np. dopasowanie skalowania)
            player.style.width = "100%";
            player.style.height = "100%";
        });
    </script>

</body>
</html>
